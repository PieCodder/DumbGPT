<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DumbGPT</title>
    <meta
      name="description"
      content="A local-first parody chatbot that gives deliberately terrible answers through Ollama."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-shell" aria-label="DumbGPT chat">
        <header class="topbar">
          <h1>DumbGPT</h1>
          <div class="topbar-actions">
            <div class="status-card">
              <span id="statusDot" class="status-dot"></span>
              <span id="statusText">Checking Ollama...</span>
            </div>
            <button id="newChatButton" type="button" class="ghost-button">New chat</button>
          </div>
        </header>

        <div id="setupNotice" class="setup-notice" hidden>
          <div>
            <strong id="setupTitle">Model setup needed</strong>
            <p id="setupMessage">DumbGPT needs a local Ollama model before it can yap badly.</p>
          </div>
          <button id="pullModelButton" type="button">Install model</button>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <div class="composer-options" aria-label="Chat options">
            <fieldset class="mode-picker">
              <legend>Thinking</legend>
              <label>
                <input type="radio" name="thinking" value="off" checked />
                <span>Fast</span>
              </label>
              <label>
                <input type="radio" name="thinking" value="low" />
                <span>Low</span>
              </label>
              <label>
                <input type="radio" name="thinking" value="medium" />
                <span>Med</span>
              </label>
              <label>
                <input type="radio" name="thinking" value="high" />
                <span>High</span>
              </label>
            </fieldset>
            <label class="web-toggle">
              <input id="webSearchToggle" type="checkbox" />
              <span class="switch" aria-hidden="true"></span>
              <span>Web search</span>
            </label>
          </div>
          <label class="sr-only" for="promptInput">Message</label>
          <div class="composer-row">
            <textarea
              id="promptInput"
              name="prompt"
              rows="2"
              placeholder="Ask a normal question. DumbGPT will ruin the answer."
              autocomplete="off"
            ></textarea>
            <button id="sendButton" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>

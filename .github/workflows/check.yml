name: Check

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        run: |
          node --check server.js
          node --check public/app.js
          node --check scripts/check.js
